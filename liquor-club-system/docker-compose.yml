version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: liquor-club-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: liquor_club_db
    volumes:
      - mongodb_data:/data/db
      - ./server/scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - liquor-club-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: liquor-club-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/liquor_club_db?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRE: 7d
      REFRESH_TOKEN_SECRET: your-refresh-token-secret-change-in-production
      REFRESH_TOKEN_EXPIRE: 30d
      MPESA_ENV: sandbox
      CURRENCY: KES
      VAT_RATE: 16
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - liquor-club-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: liquor-club-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - liquor-club-network

  nginx:
    image: nginx:alpine
    container_name: liquor-club-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - liquor-club-network

volumes:
  mongodb_data:
    driver: local

networks:
  liquor-club-network:
    driver: bridge
